# FaceHarmony AI — Render free blueprint
# New → Blueprint → this repo
# If you created a service manually: set Root Directory to backend or frontend!

services:
  - type: web
    name: faceharmony-api
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8000"

  - type: web
    name: faceharmony-web
    runtime: docker
    rootDir: frontend
    dockerfilePath: Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "3000"
      - key: NEXT_PUBLIC_API_URL
        value: /fh-api
      - key: BACKEND_ORIGIN
        fromService:
          name: faceharmony-api
          type: web
          property: hostport
